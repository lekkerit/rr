<!-- body-step: Numbered step with heading + detail
     Used in: Posts 5.2, 5.3, 5.4
     Data: step_number, heading, subtitle
-->
<div class="slide theme-{{theme}}">
  <div class="slide-content">
    <div class="step-number">{{step_number}}</div>
    <div class="big-text">{{heading}}</div>
    <div class="divider"></div>
    <div class="subtitle">{{subtitle}}</div>
  </div>
  <div class="slide-footer">@reviewrecovery</div>
</div>
