<!-- hook-text: Bold headline + subtitle with arrow
     Used in: Posts 3.1, 5.1, 9.1
     Data: heading, subtitle (optional), heading_html (optional, for inline color spans)
-->
<div class="slide theme-{{theme}}">
  <div class="slide-content">
    <div class="big-text">{{heading}}</div>
    <div class="divider"></div>
    {{#subtitle}}<div class="subtitle">{{subtitle}}</div>{{/subtitle}}
  </div>
  <div class="slide-footer">@reviewrecovery</div>
</div>
