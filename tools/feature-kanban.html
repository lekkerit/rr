<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | Feature Pipeline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0b;
            min-height: 100vh;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #0f0f10;
            border-bottom: 1px solid #1e1e22;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
        }

        .nav-tab {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #71717a;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-tab:hover {
            color: #a1a1aa;
            background: #18181b;
        }

        .nav-tab.active {
            background: #27272a;
            color: #fafafa;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-action {
            padding: 6px 12px;
            font-size: 0.8rem;
            color: #71717a;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-action:hover {
            color: #a1a1aa;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .user-menu:hover {
            background: #18181b;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            align-items: center;
            gap: 32px;
            padding: 16px 20px;
            border-bottom: 1px solid #1e1e22;
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fafafa;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #52525b;
        }

        .completion-stat {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .completion-bar {
            width: 120px;
            height: 6px;
            background: #27272a;
            border-radius: 3px;
            overflow: hidden;
        }

        .completion-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #6366f1);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid #1e1e22;
        }

        .btn-new-task {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn-new-task:hover {
            background: #6d28d9;
        }

        .filter-tabs {
            display: flex;
            gap: 4px;
            margin-left: 16px;
        }

        .filter-tab {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #71717a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            color: #a1a1aa;
        }

        .filter-tab.active {
            background: #27272a;
            color: #fafafa;
        }

        .filter-dropdown {
            background: #18181b;
            border: 1px solid #27272a;
            color: #a1a1aa;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: auto;
        }

        .filter-dropdown:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .search-input {
            background: #18181b;
            border: 1px solid #27272a;
            color: #fafafa;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            width: 180px;
        }

        .search-input::placeholder {
            color: #52525b;
        }

        .search-input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Board */
        .board {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            overflow-x: auto;
            flex: 1;
        }

        /* Columns */
        .column {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 200px);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            margin-bottom: 8px;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #a1a1aa;
        }

        .column-icon {
            font-size: 0.9rem;
        }

        .column-count {
            color: #52525b;
            font-size: 0.85rem;
            font-weight: 400;
        }

        .column-menu {
            color: #52525b;
            cursor: pointer;
            padding: 4px;
        }

        .column-menu:hover {
            color: #a1a1aa;
        }

        .column-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .empty-state {
            color: #3f3f46;
            text-align: center;
            padding: 40px 20px;
            font-size: 0.8rem;
            font-style: italic;
        }

        /* Cards */
        .card {
            background: #18181b;
            border-radius: 10px;
            padding: 14px;
            cursor: grab;
            transition: all 0.2s;
            border: 1px solid #27272a;
        }

        .card:hover {
            border-color: #3f3f46;
            transform: translateY(-1px);
        }

        .card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .card-title {
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 6px;
            line-height: 1.4;
            color: #fafafa;
        }

        .card-description {
            font-size: 0.8rem;
            color: #71717a;
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .card-tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        /* Tag colors by category */
        .tag-core { background: #7c3aed20; color: #a78bfa; }
        .tag-ai { background: #3b82f620; color: #60a5fa; }
        .tag-api { background: #10b98120; color: #34d399; }
        .tag-db { background: #f59e0b20; color: #fbbf24; }
        .tag-ui { background: #ec489920; color: #f472b6; }
        .tag-workflow { background: #6366f120; color: #818cf8; }
        .tag-security { background: #ef444420; color: #f87171; }
        .tag-devops { background: #14b8a620; color: #2dd4bf; }
        .tag-docs { background: #71717a20; color: #a1a1aa; }
        .tag-billing { background: #22c55e20; color: #4ade80; }
        .tag-marketing { background: #f9731620; color: #fb923c; }

        /* Priority indicator */
        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .priority-critical { background: #ef4444; }
        .priority-high { background: #f97316; }
        .priority-medium { background: #eab308; }
        .priority-low { background: #6b7280; }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #52525b;
        }

        /* Drop zone highlight */
        .column-body.drag-over {
            background: rgba(124, 58, 237, 0.05);
            border-radius: 8px;
        }

        /* Activity Sidebar */
        .activity-sidebar {
            width: 280px;
            border-left: 1px solid #1e1e22;
            display: flex;
            flex-direction: column;
            background: #0f0f10;
        }

        .activity-header {
            padding: 16px;
            border-bottom: 1px solid #1e1e22;
            font-weight: 500;
            font-size: 0.85rem;
            color: #a1a1aa;
        }

        .activity-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .activity-item {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        .activity-item:hover {
            background: #18181b;
        }

        .activity-user {
            color: #a1a1aa;
            font-weight: 500;
        }

        .activity-action {
            color: #52525b;
        }

        .activity-target {
            color: #8b5cf6;
        }

        .activity-time {
            display: block;
            color: #3f3f46;
            font-size: 0.7rem;
            margin-top: 4px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #18181b;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #27272a;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fafafa;
        }

        .modal-close {
            background: none;
            border: none;
            color: #52525b;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #a1a1aa;
        }

        .modal-body {
            color: #a1a1aa;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .modal-body p {
            margin-bottom: 12px;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #27272a;
        }

        .modal-meta dt {
            color: #52525b;
            font-size: 0.8rem;
        }

        .modal-meta dd {
            color: #fafafa;
            font-size: 0.85rem;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #27272a;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .modal-btn:hover {
            opacity: 0.8;
        }

        .modal-btn-primary {
            background: #7c3aed;
            color: white;
        }

        .modal-btn-secondary {
            background: #27272a;
            color: #a1a1aa;
        }

        /* New Task Modal */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            color: #71717a;
            margin-bottom: 6px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: #0f0f10;
            border: 1px solid #27272a;
            color: #fafafa;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        /* Today View */
        .today-view {
            display: none;
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            max-width: 640px;
        }

        .today-view.active { display: block; }

        .today-add-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .today-input {
            flex: 1;
            background: #18181b;
            border: 1px solid #27272a;
            color: #fafafa;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .today-input::placeholder { color: #52525b; }
        .today-input:focus { outline: none; border-color: #7c3aed; }

        .today-section-label {
            font-size: 0.75rem;
            color: #52525b;
            font-weight: 500;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .today-empty {
            color: #3f3f46;
            font-size: 0.8rem;
            font-style: italic;
            padding: 8px 0 20px;
        }

        .pinned-card-wrap { position: relative; margin-bottom: 8px; }

        .unpin-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #52525b;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 2px 4px;
            line-height: 1;
            z-index: 1;
        }

        .unpin-btn:hover { color: #a1a1aa; }

        .quick-task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .quick-task-item.done { opacity: 0.45; }

        .quick-task-check {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            cursor: pointer;
            accent-color: #7c3aed;
        }

        .quick-task-text { flex: 1; font-size: 0.85rem; color: #fafafa; }
        .quick-task-item.done .quick-task-text { text-decoration: line-through; color: #52525b; }

        .quick-task-remove {
            background: none;
            border: none;
            color: #3f3f46;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 2px;
            line-height: 1;
        }

        .quick-task-remove:hover { color: #71717a; }

        .star-btn {
            background: none;
            border: none;
            color: #3f3f46;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0;
            line-height: 1;
            transition: color 0.15s;
        }

        .star-btn:hover { color: #eab308; }
        .star-btn.starred { color: #eab308; }

        .today-clear-btn {
            background: none;
            border: none;
            color: #52525b;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 12px 0 4px;
            text-decoration: underline;
            display: block;
        }

        .today-clear-btn:hover { color: #a1a1aa; }
        .filter-bar.hidden { display: none; }

        /* Save reminder */
        .save-reminder {
            position: fixed;
            bottom: 20px;
            right: 300px;
            background: #7c3aed;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
            z-index: 1000;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .save-reminder button {
            background: white;
            color: #7c3aed;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .save-reminder .close-btn {
            background: none;
            color: white;
            font-size: 1.2rem;
            padding: 0;
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-left">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                Mission Control
            </div>
            <div class="nav-tabs">
                <div class="nav-tab active" id="tab-tasks" onclick="switchTab('tasks')">
                    <span>📋</span> Tasks
                </div>
                <div class="nav-tab" id="tab-today" onclick="switchTab('today')">
                    <span>⭐</span> Today
                </div>
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-action">
                <span>⏸</span> Pause
            </div>
            <div class="user-menu">
                <div class="user-avatar">BO</div>
                <span style="font-size: 0.85rem;">Barry</span>
            </div>
        </div>
    </nav>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-value" id="stat-this-week">0</span>
            <span class="stat-label">This week</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-in-progress">0</span>
            <span class="stat-label">In progress</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-planned">0</span>
            <span class="stat-label">Planned</span>
        </div>
        <div class="completion-stat">
            <span class="stat-value" id="stat-completion">0%</span>
            <span class="stat-label">Completion</span>
            <div class="completion-bar">
                <div class="completion-fill" id="completion-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <button class="btn-new-task" onclick="showNewTaskModal()">
            <span>+</span> New Task
        </button>
        <div class="filter-tabs">
            <div class="filter-tab active" onclick="setViewFilter('all', this)">All</div>
            <div class="filter-tab" onclick="setViewFilter('critical', this)">Critical</div>
            <div class="filter-tab" onclick="setViewFilter('high', this)">High Priority</div>
        </div>
        <select class="filter-dropdown" id="filter-category" onchange="applyFilters()">
            <option value="">All categories</option>
        </select>
        <input type="text" class="search-input" id="search-input" placeholder="Search features..." oninput="applyFilters()">
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Board -->
        <div class="board" id="board-view">
            <div class="column" data-status="planned">
                <div class="column-header">
                    <div class="column-title">
                        <span class="column-icon">📝</span>
                        Backlog
                        <span class="column-count" id="count-planned">0</span>
                    </div>
                    <span class="column-menu">⋯</span>
                </div>
                <div class="column-body" id="col-planned"></div>
            </div>

            <div class="column" data-status="in_progress">
                <div class="column-header">
                    <div class="column-title">
                        <span class="column-icon">▶</span>
                        In Progress
                        <span class="column-count" id="count-in_progress">0</span>
                    </div>
                    <span class="column-menu">⋯</span>
                </div>
                <div class="column-body" id="col-in_progress"></div>
            </div>

            <div class="column" data-status="completed">
                <div class="column-header">
                    <div class="column-title">
                        <span class="column-icon">✓</span>
                        Review
                        <span class="column-count" id="count-completed">0</span>
                    </div>
                    <span class="column-menu">⋯</span>
                </div>
                <div class="column-body" id="col-completed"></div>
            </div>

            <div class="column" data-status="deferred">
                <div class="column-header">
                    <div class="column-title">
                        <span class="column-icon">⏸</span>
                        Deferred
                        <span class="column-count" id="count-deferred">0</span>
                    </div>
                    <span class="column-menu">⋯</span>
                </div>
                <div class="column-body" id="col-deferred"></div>
            </div>
        </div>

        <!-- Today View -->
        <div class="today-view" id="today-view"></div>

        <!-- Activity Sidebar -->
        <aside class="activity-sidebar">
            <!-- Outreach Stats (one-way pull from Airtable) -->
            <div style="border-bottom: 1px solid #1e1e22; padding: 12px 16px;">
                <div style="font-size:0.75rem;color:#52525b;font-weight:500;letter-spacing:0.05em;margin-bottom:10px;">OUTREACH</div>
                <div id="outreach-content"></div>
            </div>
            <div class="activity-header">ACTIVITY</div>
            <div class="activity-list" id="activity-list">
                <!-- Activity items will be populated here -->
            </div>
        </aside>
    </div>

    <!-- Detail Modal -->

        function processFeatures() {
            allFeatures = [];

            for (const [categoryKey, category] of Object.entries(featuresData.categories)) {
                for (const feature of category.features) {
                    allFeatures.push({
                        ...feature,
                        category: categoryKey,
                        categoryName: categoryConfig[categoryKey]?.name || categoryKey,
                        tagClass: categoryConfig[categoryKey]?.tag || 'tag-core'
                    });
                }
            }

            // Populate category filters
            const categorySelect = document.getElementById('filter-category');
            const newTaskCategory = document.getElementById('new-task-category');
            categorySelect.innerHTML = '<option value="">All categories</option>';
            newTaskCategory.innerHTML = '';

            for (const [key, config] of Object.entries(categoryConfig)) {
                if (featuresData.categories[key]) {
                    categorySelect.innerHTML += `<option value="${key}">${config.name}</option>`;
                    newTaskCategory.innerHTML += `<option value="${key}">${config.name}</option>`;
                }
            }

            // Generate initial activity
            generateInitialActivity();

            applyFilters();
            updateStats();
        }

        function generateInitialActivity() {
            const actions = ['started', 'completed', 'created', 'moved'];
            const completed = allFeatures.filter(f => f.status === 'completed').slice(0, 8);
            const inProgress = allFeatures.filter(f => f.status === 'in_progress').slice(0, 3);

            activityLog = [];

            inProgress.forEach((f, i) => {
                activityLog.push({
                    user: 'Barry',
                    action: 'started',
                    target: f.name,
                    time: `${i + 1}h ago`
                });
            });

            completed.forEach((f, i) => {
                activityLog.push({
                    user: 'Barry',
                    action: 'completed',
                    target: f.name,
                    time: `${i + 1}d ago`
                });
            });

            renderActivity();
        }

        function renderActivity() {
            const list = document.getElementById('activity-list');
            list.innerHTML = activityLog.slice(0, 15).map(item => `
                <div class="activity-item">
                    <span class="activity-user">${item.user}</span>
                    <span class="activity-action"> ${item.action} </span>
                    <span class="activity-target">${item.target}</span>
                    <span class="activity-time">${item.time}</span>
                </div>
            `).join('');
        }

        function addActivity(action, target) {
            activityLog.unshift({
                user: 'Barry',
                action: action,
                target: target,
                time: 'Just now'
            });
            renderActivity();
        }

        function setViewFilter(filter, element) {
            viewFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const categoryFilter = document.getElementById('filter-category').value;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            filteredFeatures = allFeatures.filter(feature => {
                if (categoryFilter && feature.category !== categoryFilter) return false;
                if (viewFilter === 'critical' && feature.priority !== 'critical') return false;
                if (viewFilter === 'high' && !['critical', 'high'].includes(feature.priority)) return false;
                if (searchTerm) {
                    const searchable = `${feature.id} ${feature.name} ${feature.description}`.toLowerCase();
                    if (!searchable.includes(searchTerm)) return false;
                }
                return true;
            });

            renderBoard();
        }

        function updateStats() {
            const completed = allFeatures.filter(f => f.status === 'completed').length;
            const inProgress = allFeatures.filter(f => f.status === 'in_progress').length;
            const planned = allFeatures.filter(f => f.status === 'planned').length;
            const total = allFeatures.length;
            const completionPct = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('stat-this-week').textContent = completed;
            document.getElementById('stat-in-progress').textContent = inProgress;
            document.getElementById('stat-planned').textContent = planned;
            document.getElementById('stat-completion').textContent = completionPct + '%';
            document.getElementById('completion-fill').style.width = completionPct + '%';
        }

        function renderBoard() {
            const statuses = ['planned', 'in_progress', 'completed', 'deferred'];

            statuses.forEach(status => {
                const column = document.getElementById(`col-${status}`);
                const features = filteredFeatures.filter(f => f.status === status);

                document.getElementById(`count-${status}`).textContent = features.length;

                if (features.length === 0) {
                    column.innerHTML = '<div class="empty-state">No items</div>';
                    return;
                }

                column.innerHTML = features.map(feature => createCard(feature)).join('');
            });

            setupDragAndDrop();
        }

        function createCard(feature) {
            const isPinned = getTodayData().pinnedIds.includes(feature.id);
            return `
                <div class="card" draggable="true" data-id="${feature.id}" onclick="showDetail('${feature.id}')">
                    <div class="card-title">${feature.name}</div>
                    <div class="card-description">${feature.description}</div>
                    <div class="card-footer">
                        <div class="card-tags">
                            <span class="card-tag ${feature.tagClass}">${feature.categoryName}</span>
                        </div>
                        <div class="card-meta">
                            <span class="priority-dot priority-${feature.priority}" title="${feature.priority}"></span>
                            <span>${feature.id}</span>
                            <button class="star-btn ${isPinned ? 'starred' : ''}" onclick="event.stopPropagation(); togglePin('${feature.id}')" title="${isPinned ? 'Remove from Today' : 'Pin to Today'}">★</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function createPinnedCard(feature) {
            return `
                <div class="card" style="cursor:default;padding-right:34px;" onclick="showDetail('${feature.id}')">
                    <div class="card-title">${feature.name}</div>
                    <div class="card-description">${feature.description}</div>
                    <div class="card-footer">
                        <div class="card-tags">
                            <span class="card-tag ${feature.tagClass}">${feature.categoryName}</span>
                        </div>
                        <div class="card-meta">
                            <span class="priority-dot priority-${feature.priority}" title="${feature.priority}"></span>
                            <span>${feature.id}</span>
                            <span style="color:#52525b;font-size:0.7rem;">${feature.status.replace('_', ' ')}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function showDetail(featureId) {
            const feature = allFeatures.find(f => f.id === featureId);
            if (!feature) return;

            document.getElementById('modal-title').textContent = feature.name;
            document.getElementById('modal-description').textContent = feature.description;
            document.getElementById('modal-id').textContent = feature.id;
            document.getElementById('modal-category').textContent = feature.categoryName;
            document.getElementById('modal-priority').textContent = feature.priority;
            document.getElementById('modal-status').textContent = feature.status.replace('_', ' ');
            document.getElementById('modal-dependencies').textContent =
                feature.dependencies.length > 0 ? feature.dependencies.join(', ') : 'None';

            const actionBtn = document.getElementById('modal-action-btn');
            switch (feature.status) {
                case 'planned':
                    actionBtn.textContent = 'Start';
                    actionBtn.onclick = () => { changeStatusById(featureId, 'in_progress'); closeModal(); };
                    break;
                case 'in_progress':
                    actionBtn.textContent = 'Complete';
                    actionBtn.onclick = () => { changeStatusById(featureId, 'completed'); closeModal(); };
                    break;
                case 'completed':
                    actionBtn.textContent = 'Reopen';
                    actionBtn.onclick = () => { changeStatusById(featureId, 'in_progress'); closeModal(); };
                    break;
                case 'deferred':
                    actionBtn.textContent = 'Reactivate';
                    actionBtn.onclick = () => { changeStatusById(featureId, 'planned'); closeModal(); };
                    break;
            }

            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target === document.getElementById('modal-overlay')) {
                document.getElementById('modal-overlay').classList.remove('active');
            }
        }

        function showNewTaskModal() {
            document.getElementById('new-task-modal').classList.add('active');
            document.getElementById('new-task-name').focus();
        }

        function closeNewTaskModal(event) {
            if (!event || event.target === document.getElementById('new-task-modal')) {
                document.getElementById('new-task-modal').classList.remove('active');
                document.getElementById('new-task-name').value = '';
                document.getElementById('new-task-description').value = '';
            }
        }

        function createNewTask() {
            const name = document.getElementById('new-task-name').value.trim();
            const description = document.getElementById('new-task-description').value.trim();
            const category = document.getElementById('new-task-category').value;
            const priority = document.getElementById('new-task-priority').value;

            if (!name) {
                alert('Please enter a feature name');
                return;
            }

            // Generate ID
            const categoryFeatures = featuresData.categories[category].features;
            const prefix = category.substring(0, 3).toUpperCase();
            const num = categoryFeatures.length + 1;
            const id = `${prefix}-${String(num).padStart(3, '0')}`;

            const newFeature = {
                id,
                name,
                description: description || 'No description',
                status: 'planned',
                priority,
                dependencies: []
            };

            // Add to data
            featuresData.categories[category].features.push(newFeature);
            allFeatures.push({
                ...newFeature,
                category,
                categoryName: categoryConfig[category]?.name || category,
                tagClass: categoryConfig[category]?.tag || 'tag-core'
            });

            addActivity('created', name);
            closeNewTaskModal();
            applyFilters();
            updateStats();
            showSaveReminder();
        }

        function changeStatusById(featureId, newStatus) {
            const feature = allFeatures.find(f => f.id === featureId);
            if (feature) {
                const oldStatus = feature.status;
                feature.status = newStatus;

                for (const category of Object.values(featuresData.categories)) {
                    const f = category.features.find(f => f.id === featureId);
                    if (f) {
                        f.status = newStatus;
                        break;
                    }
                }

                const action = newStatus === 'completed' ? 'completed' :
                              newStatus === 'in_progress' ? 'started' : 'moved';
                addActivity(action, feature.name);
            }

            applyFilters();
            updateStats();
            showSaveReminder();
        }

        function showSaveReminder() {
            if (document.querySelector('.save-reminder')) return;

            const reminder = document.createElement('div');
            reminder.className = 'save-reminder';
            reminder.innerHTML = `
                <span>Changes made</span>
                <button onclick="exportJSON()">Export JSON</button>
                <button class="close-btn" onclick="this.parentElement.remove()">&times;</button>
            `;
            document.body.appendChild(reminder);
        }

        function exportJSON() {
            featuresData.summary = {
                total_features: allFeatures.length,
                by_status: {
                    completed: allFeatures.filter(f => f.status === 'completed').length,
                    in_progress: allFeatures.filter(f => f.status === 'in_progress').length,
                    planned: allFeatures.filter(f => f.status === 'planned').length,
                    deferred: allFeatures.filter(f => f.status === 'deferred').length
                },
                by_priority: {
                    critical: allFeatures.filter(f => f.priority === 'critical').length,
                    high: allFeatures.filter(f => f.priority === 'high').length,
                    medium: allFeatures.filter(f => f.priority === 'medium').length,
                    low: allFeatures.filter(f => f.priority === 'low').length
                }
            };

            const json = JSON.stringify(featuresData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'features.json';
            a.click();
            URL.revokeObjectURL(url);

            const reminder = document.querySelector('.save-reminder');
            if (reminder) reminder.remove();
        }

        // Drag and Drop
        function setupDragAndDrop() {
            const cards = document.querySelectorAll('.card');
            const columns = document.querySelectorAll('.column-body');

            cards.forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
            });

            columns.forEach(column => {
                column.addEventListener('dragover', handleDragOver);
                column.addEventListener('dragleave', handleDragLeave);
                column.addEventListener('drop', handleDrop);
            });
        }

        let draggedCard = null;

        function handleDragStart(e) {
            draggedCard = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.column-body').forEach(col => col.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (!draggedCard) return;

            const newStatus = e.currentTarget.closest('.column').dataset.status;
            const featureId = draggedCard.dataset.id;
            changeStatusById(featureId, newStatus);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeNewTaskModal();
            }
            if (e.key === 'n' && !e.target.matches('input, textarea')) {
                e.preventDefault();
                showNewTaskModal();
            }
        });

        // ─── Today Focus ─────────────────────────────────────────────────────────

        const TODAY_KEY = 'today-focus';
        let currentTab = 'tasks';

        function getTodayData() {
            try { return JSON.parse(localStorage.getItem(TODAY_KEY) || '{"pinnedIds":[],"quickTasks":[]}'); }
            catch { return { pinnedIds: [], quickTasks: [] }; }
        }

        function saveTodayData(data) {
            localStorage.setItem(TODAY_KEY, JSON.stringify(data));
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-tasks').classList.toggle('active', tab === 'tasks');
            document.getElementById('tab-today').classList.toggle('active', tab === 'today');
            document.getElementById('board-view').style.display = tab === 'tasks' ? '' : 'none';
            document.getElementById('today-view').classList.toggle('active', tab === 'today');
            document.querySelector('.filter-bar').classList.toggle('hidden', tab === 'today');
            if (tab === 'today') renderTodayView();
        }

        function togglePin(featureId) {
            const data = getTodayData();
            const idx = data.pinnedIds.indexOf(featureId);
            if (idx === -1) { data.pinnedIds.push(featureId); }
            else { data.pinnedIds.splice(idx, 1); }
            saveTodayData(data);
            if (currentTab === 'tasks') { renderBoard(); }
            else { renderTodayView(); }
        }

        function renderTodayView() {
            const data = getTodayData();
            const pinnedFeatures = data.pinnedIds.map(id => allFeatures.find(f => f.id === id)).filter(Boolean);

            const featuresHtml = pinnedFeatures.length > 0
                ? pinnedFeatures.map(f => `
                    <div class="pinned-card-wrap">
                        ${createPinnedCard(f)}
                        <button class="unpin-btn" onclick="togglePin('${f.id}')" title="Remove from Today">×</button>
                    </div>`).join('')
                : '<div class="today-empty">No cards pinned yet — star cards (★) from the Tasks view.</div>';

            const quickHtml = data.quickTasks.map(t => `
                <div class="quick-task-item ${t.done ? 'done' : ''}">
                    <input type="checkbox" class="quick-task-check" ${t.done ? 'checked' : ''} onchange="toggleQuickTask('${t.id}')">
                    <span class="quick-task-text">${t.text}</span>
                    <button class="quick-task-remove" onclick="removeQuickTask('${t.id}')">×</button>
                </div>`).join('');

            const hasAnything = pinnedFeatures.length > 0 || data.quickTasks.length > 0;

            document.getElementById('today-view').innerHTML = `
                <div class="today-add-bar">
                    <input type="text" class="today-input" id="today-quick-input"
                        placeholder="Add a quick task (e.g. Send 20 WA messages)…"
                        onkeydown="if(event.key==='Enter') addQuickTask()">
                    <button class="btn-new-task" onclick="addQuickTask()">+ Add</button>
                </div>
                <div class="today-section-label">FEATURE CARDS</div>
                ${featuresHtml}
                ${data.quickTasks.length > 0 ? `
                <div class="today-section-label" style="margin-top:16px;">QUICK TASKS</div>
                ${quickHtml}` : ''}
                ${hasAnything ? `<button class="today-clear-btn" onclick="clearToday()">Clear all</button>` : ''}
            `;
        }

        function addQuickTask() {
            const input = document.getElementById('today-quick-input');
            const text = input.value.trim();
            if (!text) return;
            const data = getTodayData();
            data.quickTasks.push({ id: Date.now().toString(), text, done: false });
            saveTodayData(data);
            input.value = '';
            renderTodayView();
        }

        function toggleQuickTask(id) {
            const data = getTodayData();
            const task = data.quickTasks.find(t => t.id === id);
            if (task) task.done = !task.done;
            saveTodayData(data);
            renderTodayView();
        }

        function removeQuickTask(id) {
            const data = getTodayData();
            data.quickTasks = data.quickTasks.filter(t => t.id !== id);
            saveTodayData(data);
            renderTodayView();
        }

        function clearToday() {
            saveTodayData({ pinnedIds: [], quickTasks: [] });
            renderTodayView();
            // Refresh board to clear star highlights
            if (currentTab === 'tasks') renderBoard();
        }

        // ─── Outreach Stats (one-way Airtable pull) ──────────────────────────────

        const OUTREACH_KEY = 'outreach-airtable-config';

        function getOutreachConfig() {
            try { return JSON.parse(localStorage.getItem(OUTREACH_KEY) || 'null'); }
            catch { return null; }
        }

        function saveOutreachConfig(config) {
            localStorage.setItem(OUTREACH_KEY, JSON.stringify(config));
        }

        function clearOutreachConfig() {
            localStorage.removeItem(OUTREACH_KEY);
            renderOutreachConnect();
        }

        async function fetchAllRecords(apiKey, baseId, tableName) {
            let all = [], offset = null;
            do {
                const params = new URLSearchParams({ 'fields[]': 'Status', pageSize: '100' });
                if (offset) params.append('offset', offset);
                const res = await fetch(
                    `https://api.airtable.com/v0/${baseId}/${encodeURIComponent(tableName)}?${params}`,
                    { headers: { Authorization: `Bearer ${apiKey}` } }
                );
                if (!res.ok) throw new Error(`Airtable ${res.status}`);
                const data = await res.json();
                all = all.concat(data.records);
                offset = data.offset;
            } while (offset && all.length < 500);
            return all;
        }

        async function loadOutreachStats() {
            const config = getOutreachConfig();
            if (!config) { renderOutreachConnect(); return; }

            const el = document.getElementById('outreach-content');
            el.innerHTML = '<div style="color:#52525b;font-size:0.75rem;">Loading…</div>';

            try {
                const records = await fetchAllRecords(config.apiKey, config.baseId, config.tableName);
                const counts = { 'not contacted': 0, generated: 0, sent: 0 };
                records.forEach(r => {
                    const s = (r.fields.Status || '').toLowerCase();
                    if (s in counts) counts[s]++;
                });
                renderOutreachStats(records.length, counts, config);
            } catch (err) {
                el.innerHTML = `<div style="color:#ef4444;font-size:0.75rem;">${err.message} — <span style="cursor:pointer;text-decoration:underline;" onclick="clearOutreachConfig()">disconnect</span></div>`;
            }
        }

        function outreachStatusRow(label, count, color) {
            return `<div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:0.75rem;color:#71717a;">${label}</span>
                <span style="font-size:0.75rem;font-weight:500;color:${color};">${count}</span>
            </div>`;
        }

        function renderOutreachStats(total, counts, config) {
            const sent = counts.sent;
            const pct = total > 0 ? Math.round((sent / total) * 100) : 0;
            document.getElementById('outreach-content').innerHTML = `
                <div style="margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
                        <span style="font-size:1.2rem;font-weight:600;color:#fafafa;">${sent}</span>
                        <span style="font-size:0.7rem;color:#52525b;">of ${total} sent (${pct}%)</span>
                    </div>
                    <div style="height:4px;background:#27272a;border-radius:2px;overflow:hidden;">
                        <div style="height:100%;width:${pct}%;background:#25d366;border-radius:2px;transition:width 0.3s;"></div>
                    </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px;">
                    ${outreachStatusRow('not contacted', counts['not contacted'], '#71717a')}
                    ${outreachStatusRow('generated', counts.generated, '#eab308')}
                    ${outreachStatusRow('sent', counts.sent, '#25d366')}
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span style="font-size:0.7rem;color:#3f3f46;">${config.tableName} · ${config.baseId.slice(0, 8)}…</span>
                    <button onclick="loadOutreachStats()" style="background:none;border:none;color:#52525b;cursor:pointer;font-size:0.8rem;padding:0;" title="Refresh">↻</button>
                    <button onclick="clearOutreachConfig()" style="background:none;border:none;color:#52525b;cursor:pointer;font-size:0.8rem;padding:0;" title="Disconnect">✕</button>
                </div>
            `;
        }

        function renderOutreachConnect() {
            document.getElementById('outreach-content').innerHTML = `
                <div style="display:flex;flex-direction:column;gap:6px;">
                    <input id="at-key" type="password" placeholder="Airtable API key"
                        style="background:#0f0f10;border:1px solid #27272a;color:#fafafa;padding:5px 8px;border-radius:4px;font-size:0.75rem;width:100%;" />
                    <input id="at-base" type="text" placeholder="Base ID" value="app2zhbmSiL691aKo"
                        style="background:#0f0f10;border:1px solid #27272a;color:#fafafa;padding:5px 8px;border-radius:4px;font-size:0.75rem;width:100%;" />
                    <input id="at-table" type="text" placeholder="Table name" value="Prospects"
                        style="background:#0f0f10;border:1px solid #27272a;color:#fafafa;padding:5px 8px;border-radius:4px;font-size:0.75rem;width:100%;" />
                    <button onclick="connectAirtable()"
                        style="background:#27272a;border:none;color:#a1a1aa;padding:6px;border-radius:4px;font-size:0.75rem;cursor:pointer;"
                        onmouseover="this.style.background='#3f3f46'" onmouseout="this.style.background='#27272a'">
                        Connect
                    </button>
                </div>
            `;
        }

        function connectAirtable() {
            const apiKey    = document.getElementById('at-key').value.trim();
            const baseId    = document.getElementById('at-base').value.trim();
            const tableName = document.getElementById('at-table').value.trim();
            if (!apiKey || !baseId || !tableName) return;
            saveOutreachConfig({ apiKey, baseId, tableName });
            loadOutreachStats();
        }

        // Initialize
        loadFeatures();
        loadOutreachStats();
    </script>
</body>
</html>
