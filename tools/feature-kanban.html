<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Pipeline | Restaurant Review AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #334155;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #38bdf8;
        }

        .header-icon {
            font-size: 1.5rem;
        }

        .header-stats {
            display: flex;
            gap: 24px;
            font-size: 0.9rem;
        }

        .stat {
            color: #94a3b8;
        }

        .stat-value {
            color: #38bdf8;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-refresh {
            background: #334155;
            border: none;
            color: #e2e8f0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn-refresh:hover {
            background: #475569;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            padding: 16px 30px;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .filter-select {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .search-input {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            width: 200px;
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .search-input:focus {
            outline: none;
            border-color: #38bdf8;
        }

        /* Board */
        .board {
            display: flex;
            gap: 16px;
            padding: 20px 30px;
            overflow-x: auto;
            min-height: calc(100vh - 140px);
        }

        /* Columns */
        .column {
            flex: 0 0 280px;
            background: #1e293b;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 180px);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #334155;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .column-icon {
            font-size: 1rem;
        }

        .column-count {
            background: #38bdf8;
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 24px;
            text-align: center;
        }

        .column-count.planned { background: #fbbf24; }
        .column-count.in_progress { background: #38bdf8; }
        .column-count.completed { background: #22c55e; }
        .column-count.deferred { background: #64748b; }

        .column-body {
            padding: 12px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .empty-state {
            color: #64748b;
            text-align: center;
            padding: 40px 20px;
            font-size: 0.85rem;
        }

        /* Cards */
        .card {
            background: #0f172a;
            border-radius: 8px;
            padding: 14px;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid transparent;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border-color: #334155;
        }

        .card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .card-category {
            font-size: 0.7rem;
            color: #f472b6;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .card-id {
            font-size: 0.7rem;
            color: #64748b;
            font-family: monospace;
            margin-left: 8px;
        }

        .card-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .card-description {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-priority {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-critical {
            background: #dc2626;
            color: white;
        }

        .priority-high {
            background: #f97316;
            color: white;
        }

        .priority-medium {
            background: #eab308;
            color: #0f172a;
        }

        .priority-low {
            background: #64748b;
            color: white;
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .btn-action {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-action:hover {
            opacity: 0.8;
        }

        .btn-start {
            background: #22c55e;
            color: white;
        }

        .btn-complete {
            background: #38bdf8;
            color: #0f172a;
        }

        .btn-defer {
            background: #475569;
            color: #e2e8f0;
        }

        .btn-reopen {
            background: #fbbf24;
            color: #0f172a;
        }

        /* Drop zone highlight */
        .column-body.drag-over {
            background: rgba(56, 189, 248, 0.1);
            border-radius: 8px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #e2e8f0;
        }

        .modal-body {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .modal-body p {
            margin-bottom: 12px;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #334155;
        }

        .modal-meta dt {
            color: #64748b;
            font-size: 0.8rem;
        }

        .modal-meta dd {
            color: #e2e8f0;
            font-size: 0.85rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .header-stats {
                flex-wrap: wrap;
            }

            .filter-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .column {
                flex: 0 0 260px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="header-icon">📋</span>
            <h1>Feature Pipeline</h1>
        </div>
        <div class="header-stats">
            <span class="stat">Total: <span class="stat-value" id="stat-total">0</span></span>
            <span class="stat">Critical: <span class="stat-value" id="stat-critical">0</span></span>
            <span class="stat">High: <span class="stat-value" id="stat-high">0</span></span>
            <span class="stat">Medium: <span class="stat-value" id="stat-medium">0</span></span>
            <span class="stat">Low: <span class="stat-value" id="stat-low">0</span></span>
        </div>
        <div class="header-actions">
            <button class="btn-refresh" onclick="loadFeatures()">
                🔄 Refresh
            </button>
        </div>
    </header>

    <div class="filter-bar">
        <div class="filter-group">
            <span class="filter-label">Category</span>
            <select class="filter-select" id="filter-category" onchange="applyFilters()">
                <option value="">All Categories</option>
            </select>
        </div>
        <div class="filter-group">
            <span class="filter-label">Priority</span>
            <select class="filter-select" id="filter-priority" onchange="applyFilters()">
                <option value="">All Priorities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>
        <div class="filter-group">
            <span class="filter-label">Search</span>
            <input type="text" class="search-input" id="search-input" placeholder="Search features..." oninput="applyFilters()">
        </div>
    </div>

    <div class="board">
        <div class="column" data-status="planned">
            <div class="column-header">
                <div class="column-title">
                    <span class="column-icon">📝</span>
                    PLANNED
                </div>
                <span class="column-count planned" id="count-planned">0</span>
            </div>
            <div class="column-body" id="col-planned"></div>
        </div>

        <div class="column" data-status="in_progress">
            <div class="column-header">
                <div class="column-title">
                    <span class="column-icon">🔄</span>
                    IN PROGRESS
                </div>
                <span class="column-count in_progress" id="count-in_progress">0</span>
            </div>
            <div class="column-body" id="col-in_progress"></div>
        </div>

        <div class="column" data-status="completed">
            <div class="column-header">
                <div class="column-title">
                    <span class="column-icon">✅</span>
                    COMPLETED
                </div>
                <span class="column-count completed" id="count-completed">0</span>
            </div>
            <div class="column-body" id="col-completed"></div>
        </div>

        <div class="column" data-status="deferred">
            <div class="column-header">
                <div class="column-title">
                    <span class="column-icon">⏸️</span>
                    DEFERRED
                </div>
                <span class="column-count deferred" id="count-deferred">0</span>
            </div>
            <div class="column-body" id="col-deferred"></div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title"></h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modal-description"></p>
                <dl class="modal-meta">
                    <dt>Feature ID</dt>
                    <dd id="modal-id"></dd>
                    <dt>Category</dt>
                    <dd id="modal-category"></dd>
                    <dt>Priority</dt>
                    <dd id="modal-priority"></dd>
                    <dt>Status</dt>
                    <dd id="modal-status"></dd>
                    <dt>Dependencies</dt>
                    <dd id="modal-dependencies"></dd>
                </dl>
            </div>
        </div>
    </div>

    <script>
        let featuresData = null;
        let allFeatures = [];
        let filteredFeatures = [];

        // Category display names
        const categoryNames = {
            'core_review_monitoring': 'Core Review Monitoring',
            'ai_response_generation': 'AI Response Generation',
            'response_posting': 'Response Posting',
            'human_approval_workflow': 'Human Approval',
            'database_storage': 'Database Storage',
            'workflow_automation': 'Workflow Automation',
            'notifications_alerts': 'Notifications',
            'analytics_reporting': 'Analytics & Reporting',
            'user_authentication': 'Authentication',
            'customer_onboarding': 'Onboarding',
            'billing_payments': 'Billing & Payments',
            'landing_pages_marketing': 'Marketing',
            'advertising_outreach': 'Advertising',
            'security_compliance': 'Security',
            'devops_infrastructure': 'DevOps',
            'testing_quality': 'Testing & QA',
            'documentation': 'Documentation',
            'platform_integrations': 'Integrations'
        };

        // Load features from JSON file
        async function loadFeatures() {
            try {
                // Try to load from file (works when served via HTTP)
                const response = await fetch('../features.json');
                if (response.ok) {
                    featuresData = await response.json();
                    processFeatures();
                    return;
                }
            } catch (e) {
                console.log('Could not fetch features.json, using embedded data');
            }

            // Fallback: prompt user to paste JSON
            const jsonInput = prompt('Could not load features.json automatically.\n\nPaste the contents of features.json here (or press Cancel to use demo data):');

            if (jsonInput) {
                try {
                    featuresData = JSON.parse(jsonInput);
                    processFeatures();
                } catch (e) {
                    alert('Invalid JSON. Using demo data.');
                    loadDemoData();
                }
            } else {
                loadDemoData();
            }
        }

        function loadDemoData() {
            featuresData = {
                categories: {
                    demo: {
                        description: 'Demo features',
                        features: [
                            { id: 'DEMO-001', name: 'Sample Feature 1', description: 'This is a demo feature', status: 'planned', priority: 'high', dependencies: [] },
                            { id: 'DEMO-002', name: 'Sample Feature 2', description: 'Another demo feature', status: 'in_progress', priority: 'critical', dependencies: ['DEMO-001'] },
                            { id: 'DEMO-003', name: 'Sample Feature 3', description: 'Completed demo feature', status: 'completed', priority: 'medium', dependencies: [] },
                        ]
                    }
                }
            };
            processFeatures();
        }

        function processFeatures() {
            allFeatures = [];

            // Flatten features from all categories
            for (const [categoryKey, category] of Object.entries(featuresData.categories)) {
                for (const feature of category.features) {
                    allFeatures.push({
                        ...feature,
                        category: categoryKey,
                        categoryName: categoryNames[categoryKey] || categoryKey
                    });
                }
            }

            // Populate category filter
            const categorySelect = document.getElementById('filter-category');
            categorySelect.innerHTML = '<option value="">All Categories</option>';
            for (const [key, name] of Object.entries(categoryNames)) {
                if (featuresData.categories[key]) {
                    categorySelect.innerHTML += `<option value="${key}">${name}</option>`;
                }
            }

            applyFilters();
            updateStats();
        }

        function applyFilters() {
            const categoryFilter = document.getElementById('filter-category').value;
            const priorityFilter = document.getElementById('filter-priority').value;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            filteredFeatures = allFeatures.filter(feature => {
                if (categoryFilter && feature.category !== categoryFilter) return false;
                if (priorityFilter && feature.priority !== priorityFilter) return false;
                if (searchTerm) {
                    const searchable = `${feature.id} ${feature.name} ${feature.description}`.toLowerCase();
                    if (!searchable.includes(searchTerm)) return false;
                }
                return true;
            });

            renderBoard();
        }

        function updateStats() {
            const stats = {
                total: allFeatures.length,
                critical: allFeatures.filter(f => f.priority === 'critical').length,
                high: allFeatures.filter(f => f.priority === 'high').length,
                medium: allFeatures.filter(f => f.priority === 'medium').length,
                low: allFeatures.filter(f => f.priority === 'low').length
            };

            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-critical').textContent = stats.critical;
            document.getElementById('stat-high').textContent = stats.high;
            document.getElementById('stat-medium').textContent = stats.medium;
            document.getElementById('stat-low').textContent = stats.low;
        }

        function renderBoard() {
            const statuses = ['planned', 'in_progress', 'completed', 'deferred'];

            statuses.forEach(status => {
                const column = document.getElementById(`col-${status}`);
                const features = filteredFeatures.filter(f => f.status === status);

                document.getElementById(`count-${status}`).textContent = features.length;

                if (features.length === 0) {
                    column.innerHTML = '<div class="empty-state">No items</div>';
                    return;
                }

                column.innerHTML = features.map(feature => createCard(feature)).join('');
            });

            // Setup drag and drop
            setupDragAndDrop();
        }

        function createCard(feature) {
            const actions = getActions(feature.status);

            return `
                <div class="card" draggable="true" data-id="${feature.id}" onclick="showDetail('${feature.id}')">
                    <div class="card-category">
                        ${feature.categoryName}
                        <span class="card-id">${feature.id}</span>
                    </div>
                    <div class="card-title">${feature.name}</div>
                    <div class="card-description">${feature.description}</div>
                    <div class="card-footer">
                        <span class="card-priority priority-${feature.priority}">${feature.priority}</span>
                        <div class="card-actions">
                            ${actions}
                        </div>
                    </div>
                </div>
            `;
        }

        function getActions(status) {
            switch (status) {
                case 'planned':
                    return `
                        <button class="btn-action btn-start" onclick="event.stopPropagation(); changeStatus(event, 'in_progress')">Start</button>
                        <button class="btn-action btn-defer" onclick="event.stopPropagation(); changeStatus(event, 'deferred')">Defer</button>
                    `;
                case 'in_progress':
                    return `
                        <button class="btn-action btn-complete" onclick="event.stopPropagation(); changeStatus(event, 'completed')">Complete</button>
                        <button class="btn-action btn-defer" onclick="event.stopPropagation(); changeStatus(event, 'deferred')">Defer</button>
                    `;
                case 'completed':
                    return `
                        <button class="btn-action btn-reopen" onclick="event.stopPropagation(); changeStatus(event, 'in_progress')">Reopen</button>
                    `;
                case 'deferred':
                    return `
                        <button class="btn-action btn-reopen" onclick="event.stopPropagation(); changeStatus(event, 'planned')">Reactivate</button>
                    `;
                default:
                    return '';
            }
        }

        function changeStatus(event, newStatus) {
            const card = event.target.closest('.card');
            const featureId = card.dataset.id;

            // Update in allFeatures
            const feature = allFeatures.find(f => f.id === featureId);
            if (feature) {
                feature.status = newStatus;

                // Update in original data structure
                for (const category of Object.values(featuresData.categories)) {
                    const f = category.features.find(f => f.id === featureId);
                    if (f) {
                        f.status = newStatus;
                        break;
                    }
                }
            }

            applyFilters();
            showSaveReminder();
        }

        function showSaveReminder() {
            // Show a non-blocking reminder
            const existing = document.querySelector('.save-reminder');
            if (existing) return;

            const reminder = document.createElement('div');
            reminder.className = 'save-reminder';
            reminder.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #fbbf24;
                color: #0f172a;
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 0.85rem;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                z-index: 1000;
                display: flex;
                gap: 12px;
                align-items: center;
            `;
            reminder.innerHTML = `
                <span>Changes made! Export to save.</span>
                <button onclick="exportJSON()" style="background:#0f172a;color:#fbbf24;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:600;">Export JSON</button>
                <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#0f172a;cursor:pointer;font-size:1.2rem;">&times;</button>
            `;
            document.body.appendChild(reminder);
        }

        function exportJSON() {
            // Update summary counts
            featuresData.summary = {
                total_features: allFeatures.length,
                by_status: {
                    completed: allFeatures.filter(f => f.status === 'completed').length,
                    in_progress: allFeatures.filter(f => f.status === 'in_progress').length,
                    planned: allFeatures.filter(f => f.status === 'planned').length,
                    deferred: allFeatures.filter(f => f.status === 'deferred').length
                },
                by_priority: {
                    critical: allFeatures.filter(f => f.priority === 'critical').length,
                    high: allFeatures.filter(f => f.priority === 'high').length,
                    medium: allFeatures.filter(f => f.priority === 'medium').length,
                    low: allFeatures.filter(f => f.priority === 'low').length
                }
            };

            const json = JSON.stringify(featuresData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'features.json';
            a.click();

            URL.revokeObjectURL(url);

            // Remove reminder
            const reminder = document.querySelector('.save-reminder');
            if (reminder) reminder.remove();
        }

        function showDetail(featureId) {
            const feature = allFeatures.find(f => f.id === featureId);
            if (!feature) return;

            document.getElementById('modal-title').textContent = feature.name;
            document.getElementById('modal-description').textContent = feature.description;
            document.getElementById('modal-id').textContent = feature.id;
            document.getElementById('modal-category').textContent = feature.categoryName;
            document.getElementById('modal-priority').textContent = feature.priority;
            document.getElementById('modal-status').textContent = feature.status.replace('_', ' ');
            document.getElementById('modal-dependencies').textContent =
                feature.dependencies.length > 0 ? feature.dependencies.join(', ') : 'None';

            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target === document.getElementById('modal-overlay')) {
                document.getElementById('modal-overlay').classList.remove('active');
            }
        }

        // Drag and Drop
        function setupDragAndDrop() {
            const cards = document.querySelectorAll('.card');
            const columns = document.querySelectorAll('.column-body');

            cards.forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
            });

            columns.forEach(column => {
                column.addEventListener('dragover', handleDragOver);
                column.addEventListener('dragleave', handleDragLeave);
                column.addEventListener('drop', handleDrop);
            });
        }

        let draggedCard = null;

        function handleDragStart(e) {
            draggedCard = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.column-body').forEach(col => {
                col.classList.remove('drag-over');
            });
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');

            if (!draggedCard) return;

            const newStatus = e.currentTarget.closest('.column').dataset.status;
            const featureId = draggedCard.dataset.id;

            // Update status
            const feature = allFeatures.find(f => f.id === featureId);
            if (feature && feature.status !== newStatus) {
                feature.status = newStatus;

                // Update in original data structure
                for (const category of Object.values(featuresData.categories)) {
                    const f = category.features.find(f => f.id === featureId);
                    if (f) {
                        f.status = newStatus;
                        break;
                    }
                }

                applyFilters();
                showSaveReminder();
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        loadFeatures();
    </script>
</body>
</html>
