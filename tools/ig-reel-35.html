<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IG Reel - +35% meer conversies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      gap: 20px;
    }

    .controls {
      display: flex;
      gap: 12px;
      position: relative;
      z-index: 10;
    }

    .controls button {
      font-family: 'Inter', sans-serif;
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .controls button:hover { opacity: 0.85; }

    #btnPlay {
      background: #FFA000;
      color: #fff;
    }

    #btnRecord {
      background: #e53e3e;
      color: #fff;
    }

    #btnRecord.recording {
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status {
      color: #888;
      font-size: 0.75rem;
      height: 20px;
    }

    /* === Reel canvas: 1080x1920 scaled to fit screen === */
    .reel {
      width: 1080px;
      height: 1920px;
      transform-origin: top center;
      transform: scale(0.4);
      margin-bottom: calc(-1920px * 0.6);
      background: url('../assets/images/hero-restaurant.jpg') center/cover no-repeat;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    .reel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(26, 32, 44, 0.88);
      z-index: 0;
    }

    .reel > * {
      position: relative;
      z-index: 1;
    }

    /* Animated background particles */
    .particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255, 160, 0, 0.3);
      border-radius: 50%;
    }

    /* Layout sections */
    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      padding: 80px 60px;
    }

    /* Scene 1: Hook question */
    .scene-1 .hook-text {
      font-size: 72px;
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
      opacity: 0;
    }

    .scene-1 .hook-highlight {
      color: #FFA000;
    }

    .scene-1 .hook-emoji {
      font-size: 100px;
      opacity: 0;
      margin-bottom: 40px;
    }

    /* Scene 2: Big number reveal */
    .scene-2 {
      opacity: 0;
    }

    .scene-2 .plus-sign {
      font-size: 120px;
      font-weight: 900;
      color: #FFA000;
      opacity: 0;
    }

    .scene-2 .big-number {
      font-size: 280px;
      font-weight: 900;
      color: #FFA000;
      line-height: 0.9;
      opacity: 0;
    }

    .scene-2 .percent {
      font-size: 140px;
      font-weight: 900;
      color: #FFA000;
      opacity: 0;
    }

    .scene-2 .number-row {
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .scene-2 .label-text {
      font-size: 64px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      margin-top: 40px;
      opacity: 0;
    }

    /* Scene 3: Explanation */
    .scene-3 {
      opacity: 0;
    }

    .scene-3 .explain-text {
      font-size: 56px;
      font-weight: 600;
      text-align: center;
      line-height: 1.4;
      opacity: 0;
    }

    .scene-3 .bar-container {
      width: 700px;
      margin-top: 60px;
      opacity: 0;
    }

    .scene-3 .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .scene-3 .bar-track {
      width: 100%;
      height: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
    }

    .scene-3 .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FFA000, #FFD54F);
      border-radius: 20px;
    }

    .scene-3 .bar-group + .bar-group {
      margin-top: 36px;
    }

    .scene-3 .source-text {
      font-size: 30px;
      font-weight: 500;
      opacity: 0;
      margin-top: 60px;
      color: rgba(255,255,255,0.4);
    }

    /* Scene 4: CTA */
    .scene-4 {
      opacity: 0;
    }

    .scene-4 .cta-main {
      font-size: 68px;
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
      opacity: 0;
    }

    .scene-4 .cta-highlight {
      color: #FFA000;
    }

    .scene-4 .divider {
      width: 120px;
      height: 6px;
      background: #FFA000;
      border-radius: 3px;
      margin: 40px auto;
      opacity: 0;
      transform: scaleX(0);
    }

    .scene-4 .cta-sub {
      font-size: 44px;
      font-weight: 500;
      text-align: center;
      line-height: 1.5;
      opacity: 0;
      color: rgba(255,255,255,0.7);
    }

    .scene-4 .cta-button {
      margin-top: 60px;
      padding: 30px 70px;
      background: #FFA000;
      border-radius: 60px;
      font-size: 44px;
      font-weight: 700;
      opacity: 0;
      transform: scale(0.8);
    }

    /* Branding footer */
    .brand-footer {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.35);
      z-index: 3;
    }

    /* Progress bar at top */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 6px;
      background: #FFA000;
      z-index: 10;
      width: 0%;
    }
  </style>
</head>
<body>

<div class="controls">
  <button id="btnPlay">&#9654; Play Animation</button>
  <button id="btnRecord">&#9679; Record as Video</button>
</div>
<div class="status" id="status"></div>

<div class="reel" id="reel">
  <div class="progress-bar" id="progressBar"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Scene 1: Hook -->
  <div class="scene scene-1" id="scene1">
    <div class="hook-emoji">&#x1F4F1;</div>
    <div class="hook-text">
      Reageer jij op<br><span class="hook-highlight">Google reviews</span>?
    </div>
  </div>

  <!-- Scene 2: Big stat -->
  <div class="scene scene-2" id="scene2">
    <div class="number-row">
      <div class="plus-sign">+</div>
      <div class="big-number" id="counterNum">0</div>
      <div class="percent">%</div>
    </div>
    <div class="label-text">meer conversies</div>
  </div>

  <!-- Scene 3: Explanation -->
  <div class="scene scene-3" id="scene3">
    <div class="explain-text">Restaurants die reageren<br>op reviews krijgen meer<br>boekingen</div>
    <div class="bar-container">
      <div class="bar-group">
        <div class="bar-label">
          <span>Met responses</span>
          <span style="color:#FFA000;">+35%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="barFill1"></div>
        </div>
      </div>
      <div class="bar-group">
        <div class="bar-label">
          <span>Zonder responses</span>
          <span style="color:#e53e3e;">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="barFill2" style="background:rgba(229,62,62,0.5);"></div>
        </div>
      </div>
    </div>
    <div class="source-text">Bron: Harvard Business Review</div>
  </div>

  <!-- Scene 4: CTA -->
  <div class="scene scene-4" id="scene4">
    <div class="cta-main">Laat geen<br><span class="cta-highlight">reserveringen</span><br>liggen</div>
    <div class="divider"></div>
    <div class="cta-sub">Professionele review responses<br>voor jouw restaurant</div>
    <div class="cta-button">Link in bio &rarr;</div>
  </div>

  <div class="brand-footer">@reviewrecovery</div>
</div>

<script>
  // Generate floating particles
  const particlesEl = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.width = (4 + Math.random() * 8) + 'px';
    p.style.height = p.style.width;
    particlesEl.appendChild(p);
  }

  function animateParticles() {
    anime({
      targets: '.particle',
      translateY: () => anime.random(-200, 200),
      translateX: () => anime.random(-100, 100),
      opacity: [0, () => Math.random() * 0.4 + 0.1, 0],
      scale: [0, () => Math.random() * 1.5 + 0.5, 0],
      duration: () => anime.random(4000, 8000),
      delay: () => anime.random(0, 3000),
      easing: 'easeInOutSine',
      loop: true,
    });
  }

  const TOTAL_DURATION = 12000; // 12 seconds total

  function resetAll() {
    // Reset all scenes
    document.querySelectorAll('.scene').forEach(s => {
      s.style.opacity = '0';
    });
    document.querySelector('.scene-1').style.opacity = '1';
    document.querySelector('.scene-1 .hook-emoji').style.opacity = '0';
    document.querySelector('.scene-1 .hook-text').style.opacity = '0';
    document.querySelector('.scene-1 .hook-text').style.transform = '';

    document.querySelector('.scene-2 .plus-sign').style.opacity = '0';
    document.querySelector('.scene-2 .big-number').style.opacity = '0';
    document.querySelector('.scene-2 .percent').style.opacity = '0';
    document.querySelector('.scene-2 .label-text').style.opacity = '0';
    document.getElementById('counterNum').textContent = '0';

    document.querySelector('.scene-3 .explain-text').style.opacity = '0';
    document.querySelector('.scene-3 .bar-container').style.opacity = '0';
    document.querySelector('.scene-3 .source-text').style.opacity = '0';
    document.getElementById('barFill1').style.width = '0%';
    document.getElementById('barFill2').style.width = '0%';

    document.querySelector('.scene-4 .cta-main').style.opacity = '0';
    document.querySelector('.scene-4 .divider').style.opacity = '0';
    document.querySelector('.scene-4 .divider').style.transform = 'scaleX(0)';
    document.querySelector('.scene-4 .cta-sub').style.opacity = '0';
    document.querySelector('.scene-4 .cta-button').style.opacity = '0';
    document.querySelector('.scene-4 .cta-button').style.transform = 'scale(0.8)';

    document.getElementById('progressBar').style.width = '0%';
  }

  function playAnimation() {
    resetAll();
    anime.remove('.scene-1 .hook-emoji, .scene-1 .hook-text, .scene-2, .scene-3, .scene-4');

    const tl = anime.timeline({ easing: 'easeOutExpo' });

    // Progress bar
    tl.add({
      targets: '#progressBar',
      width: '100%',
      duration: TOTAL_DURATION,
      easing: 'linear',
    }, 0);

    // === SCENE 1: Hook (0 - 3000ms) ===
    tl.add({
      targets: '.scene-1 .hook-emoji',
      opacity: [0, 1],
      scale: [0.3, 1],
      duration: 600,
      easing: 'easeOutBack',
    }, 200);

    tl.add({
      targets: '.scene-1 .hook-text',
      opacity: [0, 1],
      translateY: [60, 0],
      duration: 800,
    }, 600);

    // Fade out scene 1
    tl.add({
      targets: '#scene1',
      opacity: 0,
      duration: 400,
      easing: 'easeInQuad',
    }, 2600);

    // === SCENE 2: Big number (3000 - 6500ms) ===
    tl.add({
      targets: '#scene2',
      opacity: [0, 1],
      duration: 100,
    }, 3000);

    tl.add({
      targets: '.scene-2 .plus-sign',
      opacity: [0, 1],
      translateX: [-40, 0],
      duration: 500,
    }, 3100);

    tl.add({
      targets: '.scene-2 .big-number',
      opacity: [0, 1],
      scale: [2, 1],
      duration: 700,
      easing: 'easeOutBack',
    }, 3200);

    // Counter animation
    tl.add({
      targets: { val: 0 },
      val: 35,
      round: 1,
      duration: 1200,
      easing: 'easeOutExpo',
      update: function(anim) {
        document.getElementById('counterNum').textContent = Math.round(anim.animations[0].currentValue);
      },
    }, 3200);

    tl.add({
      targets: '.scene-2 .percent',
      opacity: [0, 1],
      translateX: [40, 0],
      duration: 500,
    }, 3400);

    tl.add({
      targets: '.scene-2 .label-text',
      opacity: [0, 1],
      translateY: [30, 0],
      duration: 600,
    }, 4000);

    // Pulse the number
    tl.add({
      targets: '.scene-2 .big-number',
      scale: [1, 1.08, 1],
      duration: 400,
      easing: 'easeInOutSine',
    }, 4800);

    // Fade out scene 2
    tl.add({
      targets: '#scene2',
      opacity: 0,
      duration: 400,
      easing: 'easeInQuad',
    }, 6100);

    // === SCENE 3: Explanation (6500 - 9500ms) ===
    tl.add({
      targets: '#scene3',
      opacity: [0, 1],
      duration: 100,
    }, 6500);

    tl.add({
      targets: '.scene-3 .explain-text',
      opacity: [0, 1],
      translateY: [40, 0],
      duration: 700,
    }, 6600);

    tl.add({
      targets: '.scene-3 .bar-container',
      opacity: [0, 1],
      duration: 400,
    }, 7100);

    tl.add({
      targets: '#barFill1',
      width: '85%',
      duration: 1000,
      easing: 'easeOutQuart',
    }, 7300);

    tl.add({
      targets: '#barFill2',
      width: '50%',
      duration: 800,
      easing: 'easeOutQuart',
    }, 7600);

    tl.add({
      targets: '.scene-3 .source-text',
      opacity: [0, 1],
      duration: 500,
    }, 8400);

    // Fade out scene 3
    tl.add({
      targets: '#scene3',
      opacity: 0,
      duration: 400,
      easing: 'easeInQuad',
    }, 9100);

    // === SCENE 4: CTA (9500 - 12000ms) ===
    tl.add({
      targets: '#scene4',
      opacity: [0, 1],
      duration: 100,
    }, 9500);

    tl.add({
      targets: '.scene-4 .cta-main',
      opacity: [0, 1],
      translateY: [50, 0],
      duration: 800,
    }, 9600);

    tl.add({
      targets: '.scene-4 .divider',
      opacity: [0, 1],
      scaleX: [0, 1],
      duration: 500,
    }, 10200);

    tl.add({
      targets: '.scene-4 .cta-sub',
      opacity: [0, 1],
      translateY: [30, 0],
      duration: 600,
    }, 10400);

    tl.add({
      targets: '.scene-4 .cta-button',
      opacity: [0, 1],
      scale: [0.8, 1],
      duration: 600,
      easing: 'easeOutBack',
    }, 10800);

    return tl;
  }

  // Play button
  document.getElementById('btnPlay').addEventListener('click', () => {
    animateParticles();
    playAnimation();
  });

  // Record button using MediaRecorder + canvas
  document.getElementById('btnRecord').addEventListener('click', async () => {
    const btn = document.getElementById('btnRecord');
    const status = document.getElementById('status');
    const reel = document.getElementById('reel');

    btn.classList.add('recording');
    btn.disabled = true;
    status.textContent = 'Preparing to record...';

    try {
      // Use html2canvas approach via captureStream on a canvas
      // For best results, we use the experimental captureStream API on the element
      const canvas = document.createElement('canvas');
      canvas.width = 1080;
      canvas.height = 1920;
      const ctx = canvas.getContext('2d');

      const stream = canvas.captureStream(30);
      const mediaRecorder = new MediaRecorder(stream, {
        mimeType: 'video/webm;codecs=vp9',
        videoBitsPerSecond: 8000000,
      });

      const chunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'reel-35-procent.webm';
        a.click();
        URL.revokeObjectURL(url);
        btn.classList.remove('recording');
        btn.disabled = false;
        status.textContent = 'Download complete! Convert to MP4 if needed.';
      };

      // We need html2canvas to render the DOM to canvas each frame
      // Load it dynamically
      if (!window.html2canvas) {
        status.textContent = 'Loading html2canvas...';
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      status.textContent = 'Recording... (12 seconds)';
      mediaRecorder.start();

      // Start animation
      animateParticles();
      playAnimation();

      // Capture frames
      const fps = 30;
      const interval = 1000 / fps;
      let elapsed = 0;

      const captureFrame = async () => {
        if (elapsed >= TOTAL_DURATION + 500) {
          mediaRecorder.stop();
          return;
        }
        try {
          const c = await html2canvas(reel, {
            width: 1080,
            height: 1920,
            scale: 1,
            useCORS: true,
            backgroundColor: '#1a202c',
          });
          ctx.clearRect(0, 0, 1080, 1920);
          ctx.drawImage(c, 0, 0, 1080, 1920);
        } catch (e) { /* skip frame */ }
        elapsed += interval;
        setTimeout(captureFrame, interval);
      };

      captureFrame();

    } catch (err) {
      status.textContent = 'Recording failed: ' + err.message + '. Try screen recording instead.';
      btn.classList.remove('recording');
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
