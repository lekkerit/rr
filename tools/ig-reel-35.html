<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IG Reel - +35% meer conversies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      gap: 20px;
    }

    .controls {
      display: flex;
      gap: 12px;
      position: relative;
      z-index: 10;
    }

    .controls button {
      font-family: 'Inter', sans-serif;
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .controls button:hover { opacity: 0.85; }

    #btnPlay {
      background: #FFA000;
      color: #fff;
    }

    #btnRecord {
      background: #e53e3e;
      color: #fff;
    }

    #btnRecord.recording {
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status {
      color: #888;
      font-size: 0.75rem;
      height: 20px;
    }

    /* === Reel canvas: 1080x1920 scaled to fit screen === */
    .reel {
      width: 1080px;
      height: 1920px;
      transform-origin: top center;
      transform: scale(0.4);
      margin-bottom: calc(-1920px * 0.6);
      background: url('../assets/images/hero-restaurant.jpg') center/cover no-repeat;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    .reel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(26, 32, 44, 0.97);
      z-index: 0;
    }

    .reel > * {
      position: relative;
      z-index: 1;
    }

    /* Animated background particles */
    .particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255, 160, 0, 0.3);
      border-radius: 50%;
    }

    /* Layout sections */
    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      padding: 80px 60px;
    }

    /* Scene 1: Hook question */
    .scene-1 .hook-text {
      font-size: 72px;
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
      opacity: 0;
    }

    .scene-1 .hook-highlight {
      color: #FFA000;
    }

    .scene-1 .hook-emoji {
      font-size: 100px;
      opacity: 0;
      margin-bottom: 40px;
    }

    /* Scene 2: Big number reveal */
    .scene-2 {
      opacity: 0;
    }

    .scene-2 .plus-sign {
      font-size: 120px;
      font-weight: 900;
      color: #FFA000;
      opacity: 0;
    }

    .scene-2 .big-number {
      font-size: 280px;
      font-weight: 900;
      color: #FFA000;
      line-height: 0.9;
      opacity: 0;
    }

    .scene-2 .percent {
      font-size: 140px;
      font-weight: 900;
      color: #FFA000;
      opacity: 0;
    }

    .scene-2 .number-row {
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .scene-2 .label-text {
      font-size: 64px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      margin-top: 40px;
      opacity: 0;
    }

    /* Scene 3: Explanation */
    .scene-3 {
      opacity: 0;
    }

    .scene-3 .explain-text {
      font-size: 56px;
      font-weight: 600;
      text-align: center;
      line-height: 1.4;
      opacity: 0;
    }

    .scene-3 .bar-container {
      width: 700px;
      margin-top: 60px;
      opacity: 0;
    }

    .scene-3 .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .scene-3 .bar-track {
      width: 100%;
      height: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
    }

    .scene-3 .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FFA000, #FFD54F);
      border-radius: 20px;
    }

    .scene-3 .bar-group + .bar-group {
      margin-top: 36px;
    }

    .scene-3 .source-text {
      font-size: 30px;
      font-weight: 500;
      opacity: 0;
      margin-top: 60px;
      color: rgba(255,255,255,0.4);
    }

    /* Scene 4: CTA */
    .scene-4 {
      opacity: 0;
    }

    .scene-4 .cta-main {
      font-size: 68px;
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
      opacity: 0;
    }

    .scene-4 .cta-highlight {
      color: #FFA000;
    }

    .scene-4 .divider {
      width: 120px;
      height: 6px;
      background: #FFA000;
      border-radius: 3px;
      margin: 40px auto;
      opacity: 0;
      transform: scaleX(0);
    }

    .scene-4 .cta-sub {
      font-size: 44px;
      font-weight: 500;
      text-align: center;
      line-height: 1.5;
      opacity: 0;
      color: rgba(255,255,255,0.7);
    }

    .scene-4 .cta-button {
      margin-top: 60px;
      padding: 30px 70px;
      background: #FFA000;
      border-radius: 60px;
      font-size: 44px;
      font-weight: 700;
      opacity: 0;
      transform: scale(0.8);
    }

    /* Branding footer */
    .brand-footer {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.35);
      z-index: 3;
    }

    /* Progress bar at top */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 6px;
      background: #FFA000;
      z-index: 10;
      width: 0%;
    }
  </style>
</head>
<body>

<div class="controls">
  <button id="btnPlay">&#9654; Play Animation</button>
  <button id="btnRecord">&#9679; Record as Video</button>
</div>
<div class="status" id="status"></div>

<div class="reel" id="reel">
  <div class="progress-bar" id="progressBar"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Scene 1: Hook -->
  <div class="scene scene-1" id="scene1">
    <div class="hook-emoji"><svg xmlns="http://www.w3.org/2000/svg" width="320" height="380" viewBox="0 0 320 380">
      <!-- Card background -->
      <rect x="0" y="0" width="320" height="380" rx="20" ry="20" fill="#1a1f2e"/>
      <rect x="0" y="0" width="320" height="380" rx="20" ry="20" fill="none" stroke="#2a3040" stroke-width="2"/>

      <!-- Header bar -->
      <rect x="24" y="24" width="60" height="6" rx="3" fill="#555"/>
      <circle cx="300" cy="27" r="4" fill="#666" opacity="0.5"/>

      <!-- Notification badge -->
      <circle cx="296" cy="16" r="14" fill="#e53e3e"/>
      <text x="296" y="21" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="14" font-weight="700">3</text>

      <!-- Color bar indicators -->
      <rect x="24" y="44" width="60" height="5" rx="2.5" fill="#4299e1"/>
      <rect x="90" y="44" width="60" height="5" rx="2.5" fill="#e53e3e"/>
      <rect x="156" y="44" width="60" height="5" rx="2.5" fill="#ecc94b"/>
      <rect x="222" y="44" width="60" height="5" rx="2.5" fill="#48bb78"/>

      <!-- Review 1 -->
      <rect x="16" y="64" width="288" height="88" rx="12" fill="#242a3a"/>
      <circle cx="44" cy="92" r="18" fill="#48bb78"/>
      <text x="44" y="98" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="16" font-weight="700">A</text>
      <text x="72" y="88" fill="#fff" font-family="Inter,sans-serif" font-size="14" font-weight="600">Anna de Vries</text>
      <text x="72" y="104" fill="#ecc94b" font-family="sans-serif" font-size="12">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
      <text x="24" y="126" fill="#aaa" font-family="Inter,sans-serif" font-size="11">"Fantastisch eten en geweldige sfeer!"</text>
      <rect x="24" y="132" width="90" height="16" rx="8" fill="#276749" opacity="0.7"/>
      <text x="30" y="143" fill="#48bb78" font-family="Inter,sans-serif" font-size="9" font-weight="600">&#10003; Beantwoord</text>

      <!-- Review 2 -->
      <rect x="16" y="162" width="288" height="88" rx="12" fill="#242a3a"/>
      <circle cx="44" cy="190" r="18" fill="#9f7aea"/>
      <text x="44" y="196" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="16" font-weight="700">M</text>
      <text x="72" y="186" fill="#fff" font-family="Inter,sans-serif" font-size="14" font-weight="600">Mark Jansen</text>
      <text x="72" y="202" fill="#ecc94b" font-family="sans-serif" font-size="12">&#9733;&#9733;&#9733;&#9733;</text>
      <text x="24" y="224" fill="#aaa" font-family="Inter,sans-serif" font-size="11">"Lekker gegeten, service kan beter."</text>
      <rect x="24" y="230" width="90" height="16" rx="8" fill="#276749" opacity="0.7"/>
      <text x="30" y="241" fill="#48bb78" font-family="Inter,sans-serif" font-size="9" font-weight="600">&#10003; Beantwoord</text>

      <!-- Review 3 -->
      <rect x="16" y="260" width="288" height="88" rx="12" fill="#242a3a"/>
      <circle cx="44" cy="288" r="18" fill="#4299e1"/>
      <text x="44" y="294" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="16" font-weight="700">S</text>
      <text x="72" y="284" fill="#fff" font-family="Inter,sans-serif" font-size="14" font-weight="600">Sophie Bakker</text>
      <text x="72" y="300" fill="#ecc94b" font-family="sans-serif" font-size="12">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
      <text x="24" y="322" fill="#aaa" font-family="Inter,sans-serif" font-size="11">"Toprestaurant! Zeker een aanrader."</text>
      <rect x="24" y="328" width="90" height="16" rx="8" fill="#276749" opacity="0.7"/>
      <text x="30" y="339" fill="#48bb78" font-family="Inter,sans-serif" font-size="9" font-weight="600">&#10003; Beantwoord</text>
    </svg></div>
    <div class="hook-text">
      Reageer jij op<br><span class="hook-highlight">Google reviews</span>?
    </div>
  </div>

  <!-- Scene 2: Big stat -->
  <div class="scene scene-2" id="scene2">
    <div class="number-row">
      <div class="plus-sign">+</div>
      <div class="big-number" id="counterNum">0</div>
      <div class="percent">%</div>
    </div>
    <div class="label-text">meer conversies</div>
  </div>

  <!-- Scene 3: Explanation -->
  <div class="scene scene-3" id="scene3">
    <div class="explain-text">Restaurants die reageren<br>op reviews krijgen meer<br>boekingen</div>
    <div class="bar-container">
      <div class="bar-group">
        <div class="bar-label">
          <span>Met responses</span>
          <span style="color:#FFA000;">+35%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="barFill1"></div>
        </div>
      </div>
      <div class="bar-group">
        <div class="bar-label">
          <span>Zonder responses</span>
          <span style="color:#e53e3e;">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="barFill2" style="background:rgba(229,62,62,0.5);"></div>
        </div>
      </div>
    </div>
    <div class="source-text">Bron: Harvard Business Review</div>
  </div>

  <!-- Scene 4: CTA -->
  <div class="scene scene-4" id="scene4">
    <div class="cta-main">Laat geen<br><span class="cta-highlight">reserveringen</span><br>liggen</div>
    <div class="divider"></div>
    <div class="cta-sub">Professionele review responses<br>voor jouw restaurant</div>
    <div class="cta-button">Link in bio &rarr;</div>
  </div>

  <div class="brand-footer">@reviewrecovery</div>
</div>

<script>
  // ===================================================================
  // TIMING CONFIG — adjust scene durations here to avoid rework
  // Each scene has: animateIn (elements appear), hold (stay visible), fadeOut
  // ===================================================================
  const TIMING = {
    scene1: { start: 500,   animateIn: 1800, hold: 3000, fadeOut: 600 },
    scene2: { gap: 400,     animateIn: 2800, hold: 3000, fadeOut: 600 },
    scene3: { gap: 400,     animateIn: 3000, hold: 3500, fadeOut: 600 },
    scene4: { gap: 400,     animateIn: 2200, hold: 3000, fadeOut: 0   },
  };

  // Compute absolute timestamps from config
  const S1_START = TIMING.scene1.start;
  const S1_FADEOUT = S1_START + TIMING.scene1.animateIn + TIMING.scene1.hold;
  const S1_END = S1_FADEOUT + TIMING.scene1.fadeOut;

  const S2_START = S1_END + TIMING.scene2.gap;
  const S2_FADEOUT = S2_START + TIMING.scene2.animateIn + TIMING.scene2.hold;
  const S2_END = S2_FADEOUT + TIMING.scene2.fadeOut;

  const S3_START = S2_END + TIMING.scene3.gap;
  const S3_FADEOUT = S3_START + TIMING.scene3.animateIn + TIMING.scene3.hold;
  const S3_END = S3_FADEOUT + TIMING.scene3.fadeOut;

  const S4_START = S3_END + TIMING.scene4.gap;
  const S4_END = S4_START + TIMING.scene4.animateIn + TIMING.scene4.hold;

  const TOTAL_DURATION = S4_END;

  // Log computed duration for capture script alignment
  console.log(`[TIMING] Total duration: ${TOTAL_DURATION}ms (${(TOTAL_DURATION/1000).toFixed(1)}s)`);
  console.log(`[TIMING] Scene 1: ${S1_START}–${S1_END}ms | Scene 2: ${S2_START}–${S2_END}ms | Scene 3: ${S3_START}–${S3_END}ms | Scene 4: ${S4_START}–${S4_END}ms`);

  // Generate floating particles
  const particlesEl = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.width = (4 + Math.random() * 8) + 'px';
    p.style.height = p.style.width;
    particlesEl.appendChild(p);
  }

  function animateParticles() {
    anime({
      targets: '.particle',
      translateY: () => anime.random(-200, 200),
      translateX: () => anime.random(-100, 100),
      opacity: [0, () => Math.random() * 0.4 + 0.1, 0],
      scale: [0, () => Math.random() * 1.5 + 0.5, 0],
      duration: () => anime.random(4000, 8000),
      delay: () => anime.random(0, 3000),
      easing: 'easeInOutSine',
      loop: true,
    });
  }

  function resetAll() {
    // Reset all scenes
    document.querySelectorAll('.scene').forEach(s => {
      s.style.opacity = '0';
    });
    document.querySelector('.scene-1').style.opacity = '1';
    document.querySelector('.scene-1 .hook-emoji').style.opacity = '0';
    document.querySelector('.scene-1 .hook-text').style.opacity = '0';
    document.querySelector('.scene-1 .hook-text').style.transform = '';

    document.querySelector('.scene-2 .plus-sign').style.opacity = '0';
    document.querySelector('.scene-2 .big-number').style.opacity = '0';
    document.querySelector('.scene-2 .percent').style.opacity = '0';
    document.querySelector('.scene-2 .label-text').style.opacity = '0';
    document.getElementById('counterNum').textContent = '0';

    document.querySelector('.scene-3 .explain-text').style.opacity = '0';
    document.querySelector('.scene-3 .bar-container').style.opacity = '0';
    document.querySelector('.scene-3 .source-text').style.opacity = '0';
    document.getElementById('barFill1').style.width = '0%';
    document.getElementById('barFill2').style.width = '0%';

    document.querySelector('.scene-4 .cta-main').style.opacity = '0';
    document.querySelector('.scene-4 .divider').style.opacity = '0';
    document.querySelector('.scene-4 .divider').style.transform = 'scaleX(0)';
    document.querySelector('.scene-4 .cta-sub').style.opacity = '0';
    document.querySelector('.scene-4 .cta-button').style.opacity = '0';
    document.querySelector('.scene-4 .cta-button').style.transform = 'scale(0.8)';

    document.getElementById('progressBar').style.width = '0%';
  }

  function playAnimation() {
    resetAll();
    anime.remove('.scene-1 .hook-emoji, .scene-1 .hook-text, .scene-2, .scene-3, .scene-4');

    const tl = anime.timeline({ easing: 'easeOutExpo' });

    // Progress bar
    tl.add({
      targets: '#progressBar',
      width: '100%',
      duration: TOTAL_DURATION,
      easing: 'linear',
    }, 0);

    // === SCENE 1: Hook ===
    tl.add({
      targets: '.scene-1 .hook-emoji',
      opacity: [0, 1],
      scale: [0.3, 1],
      duration: 1200,
      easing: 'easeOutBack',
    }, S1_START);

    tl.add({
      targets: '.scene-1 .hook-text',
      opacity: [0, 1],
      translateY: [60, 0],
      duration: 1400,
    }, S1_START + 800);

    // Fade out scene 1
    tl.add({
      targets: '#scene1',
      opacity: 0,
      duration: TIMING.scene1.fadeOut,
      easing: 'easeInOutQuad',
    }, S1_FADEOUT);

    // === SCENE 2: Big number ===
    tl.add({
      targets: '#scene2',
      opacity: [0, 1],
      duration: 400,
    }, S2_START);

    tl.add({
      targets: '.scene-2 .plus-sign',
      opacity: [0, 1],
      translateX: [-40, 0],
      duration: 800,
    }, S2_START + 200);

    tl.add({
      targets: '.scene-2 .big-number',
      opacity: [0, 1],
      scale: [2, 1],
      duration: 1100,
      easing: 'easeOutBack',
    }, S2_START + 400);

    // Counter animation
    tl.add({
      targets: { val: 0 },
      val: 35,
      round: 1,
      duration: 1800,
      easing: 'easeOutExpo',
      update: function(anim) {
        document.getElementById('counterNum').textContent = Math.round(anim.animations[0].currentValue);
      },
    }, S2_START + 400);

    tl.add({
      targets: '.scene-2 .percent',
      opacity: [0, 1],
      translateX: [40, 0],
      duration: 800,
    }, S2_START + 700);

    tl.add({
      targets: '.scene-2 .label-text',
      opacity: [0, 1],
      translateY: [30, 0],
      duration: 900,
    }, S2_START + 1700);

    // Pulse the number during hold
    tl.add({
      targets: '.scene-2 .big-number',
      scale: [1, 1.08, 1],
      duration: 600,
      easing: 'easeInOutSine',
    }, S2_FADEOUT - 800);

    // Fade out scene 2
    tl.add({
      targets: '#scene2',
      opacity: 0,
      duration: TIMING.scene2.fadeOut,
      easing: 'easeInOutQuad',
    }, S2_FADEOUT);

    // === SCENE 3: Explanation ===
    tl.add({
      targets: '#scene3',
      opacity: [0, 1],
      duration: 400,
    }, S3_START);

    tl.add({
      targets: '.scene-3 .explain-text',
      opacity: [0, 1],
      translateY: [40, 0],
      duration: 1200,
    }, S3_START + 200);

    tl.add({
      targets: '.scene-3 .bar-container',
      opacity: [0, 1],
      duration: 600,
    }, S3_START + 1000);

    tl.add({
      targets: '#barFill1',
      width: '85%',
      duration: 1500,
      easing: 'easeOutQuart',
    }, S3_START + 1300);

    tl.add({
      targets: '#barFill2',
      width: '50%',
      duration: 1200,
      easing: 'easeOutQuart',
    }, S3_START + 1700);

    tl.add({
      targets: '.scene-3 .source-text',
      opacity: [0, 1],
      duration: 700,
    }, S3_START + 2900);

    // Fade out scene 3
    tl.add({
      targets: '#scene3',
      opacity: 0,
      duration: TIMING.scene3.fadeOut,
      easing: 'easeInOutQuad',
    }, S3_FADEOUT);

    // === SCENE 4: CTA ===
    tl.add({
      targets: '#scene4',
      opacity: [0, 1],
      duration: 400,
    }, S4_START);

    tl.add({
      targets: '.scene-4 .cta-main',
      opacity: [0, 1],
      translateY: [50, 0],
      duration: 1400,
    }, S4_START + 200);

    tl.add({
      targets: '.scene-4 .divider',
      opacity: [0, 1],
      scaleX: [0, 1],
      duration: 800,
    }, S4_START + 1200);

    tl.add({
      targets: '.scene-4 .cta-sub',
      opacity: [0, 1],
      translateY: [30, 0],
      duration: 900,
    }, S4_START + 1600);

    tl.add({
      targets: '.scene-4 .cta-button',
      opacity: [0, 1],
      scale: [0.8, 1],
      duration: 900,
      easing: 'easeOutBack',
    }, S4_START + 2200);

    return tl;
  }

  // Play button
  document.getElementById('btnPlay').addEventListener('click', () => {
    animateParticles();
    playAnimation();
  });

  // Record button using MediaRecorder + canvas
  document.getElementById('btnRecord').addEventListener('click', async () => {
    const btn = document.getElementById('btnRecord');
    const status = document.getElementById('status');
    const reel = document.getElementById('reel');

    btn.classList.add('recording');
    btn.disabled = true;
    status.textContent = 'Preparing to record...';

    try {
      // Use html2canvas approach via captureStream on a canvas
      // For best results, we use the experimental captureStream API on the element
      const canvas = document.createElement('canvas');
      canvas.width = 1080;
      canvas.height = 1920;
      const ctx = canvas.getContext('2d');

      const stream = canvas.captureStream(30);
      const mediaRecorder = new MediaRecorder(stream, {
        mimeType: 'video/webm;codecs=vp9',
        videoBitsPerSecond: 8000000,
      });

      const chunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'reel-35-procent.webm';
        a.click();
        URL.revokeObjectURL(url);
        btn.classList.remove('recording');
        btn.disabled = false;
        status.textContent = 'Download complete! Convert to MP4 if needed.';
      };

      // We need html2canvas to render the DOM to canvas each frame
      // Load it dynamically
      if (!window.html2canvas) {
        status.textContent = 'Loading html2canvas...';
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      status.textContent = 'Recording... (18 seconds)';
      mediaRecorder.start();

      // Start animation
      animateParticles();
      playAnimation();

      // Capture frames
      const fps = 30;
      const interval = 1000 / fps;
      let elapsed = 0;

      const captureFrame = async () => {
        if (elapsed >= TOTAL_DURATION + 500) {
          mediaRecorder.stop();
          return;
        }
        try {
          const c = await html2canvas(reel, {
            width: 1080,
            height: 1920,
            scale: 1,
            useCORS: true,
            backgroundColor: '#1a202c',
          });
          ctx.clearRect(0, 0, 1080, 1920);
          ctx.drawImage(c, 0, 0, 1080, 1920);
        } catch (e) { /* skip frame */ }
        elapsed += interval;
        setTimeout(captureFrame, interval);
      };

      captureFrame();

    } catch (err) {
      status.textContent = 'Recording failed: ' + err.message + '. Try screen recording instead.';
      btn.classList.remove('recording');
      btn.disabled = false;
    }
  });
</script>
